joy_node:
  ros__parameters:
    dev: /dev/input/js0
    deadzone: 0.05
    autorepeat_rate: 20.0

dog_teleop:
  ros__parameters:
    # Joystick input topic from joy_node.
    joy_topic: /joy

    # High-level action topic consumed by quadruped_gait_controller.
    gait_action_topic: /gait_action

    # Left stick mapping:
    # axis 1 > 0 -> forward, axis 1 < 0 -> backward
    # axis 0 > 0 -> turn_left, axis 0 < 0 -> turn_right
    linear_axis: 1
    angular_axis: 0
    invert_linear: false
    invert_angular: false

    # Deadzone - ignore input below this threshold.
    deadzone_linear: 0.25
    deadzone_angular: 0.25

    # If no joystick signal is received for this duration, publish "stand".
    joy_timeout: 0.5

    # A button (buttons[0]) publishes "stand" immediately.
    emergency_stop_button: 0
