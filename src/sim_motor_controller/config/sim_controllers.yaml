controller_manager:
  ros__parameters:
    update_rate: 200

joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster

arm_position_controller:
  ros__parameters:
    type: forward_command_controller/ForwardCommandController
    joints:
      - base_yaw_joint
      - shoulder_pitch_joint
      - elbow_pitch_joint
      - wrist_pitch_joint
    interface_name: position
