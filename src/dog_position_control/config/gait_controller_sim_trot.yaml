quadruped_gait_controller:
  ros__parameters:
    # 基础运行参数
    use_sim_time: true              # 使用 Gazebo/仿真时钟；仿真里通常保持 true
    command_topic: /motor_cmd       # 控制器输出总命令的话题，4 条腿 * 3 关节 * 5 个控制量

    # 手柄遥控参数 (dog_teleop 集成)
    cmd_vel_topic: /cmd_vel         # 订阅 dog_teleop 发布的速度指令
    cmd_vel_timeout: 0.5            # 超过此时间未收到新指令则归零，单位 s
    max_linear_vel: 0.5             # 对应满幅步长的线速度上限，单位 m/s
    max_angular_vel: 1.0            # 对应满幅转向差速的角速度上限，单位 rad/s
    cmd_vel_deadzone: 0.05          # 速度指令绝对值之和低于此阈值视为"停止"

    # 步态基础参数
    gait_profile: trot              # 步态类型；当前使用对角小跑 trot
    step_length: 0.055              # 单步名义步长，越大前后摆动越明显
    step_height: 0.015              # 摆动相基础抬脚高度
    gait_period: 0.8                # 一个完整步态周期时长，单位 s
    stance_depth: 0.39              # 名义站高/支撑深度，越大腿越“长”
    control_rate: 400.0             # 控制循环频率，单位 Hz
    swing_ratio: 0.50               # 摆动相占整个周期的比例；trot 常取 0.5 左右
    stance_transition_ratio: 0.15   # 支撑相两端用于速度缓入/缓出的比例
    reset_phase_on_walk_start: true # 每次从站立进入行走时重置全局步态相位
    walk_start_phase: 0.0           # trot 下从一组对角腿刚开始摆动的位置起步

    # 摆动相与后腿补偿
    swing_gain_scale: 0.65          # 摆动相整体 PD 增益倍率
    swing_hfe_motion_scale: 0.40    # 摆动时 HFE 目标插值比例，越小大腿前后摆越保守
    swing_extra_kfe_flexion: 0.10   # 摆动相额外增加的 KFE 弯曲量，用来辅助收腿/离地
    rear_swing_step_length_scale: 1.0  # 后腿摆动步长相对前腿的倍率
    rear_swing_step_height_scale: 1.60   # trot 下把后腿摆动抬脚量显著放大，先解决“后腿不离地”
    rear_swing_gain_scale: 1.20          # 后腿摆动期跟踪再硬一点，避免目标给了但腿抬不起来
    rear_swing_hfe_motion_scale: 2.40    # 乘上全局 0.40 后接近 1.0，让后腿髋关节不再明显慢半拍
    rear_swing_extra_kfe_flexion_scale: 1.80  # 后腿摆动时额外多卷一点膝，优先把脚尖/小腿收离地面
    rear_swing_pitch_feedforward_offset: 0.0  # 后腿摆动时附加的俯仰前馈高度补偿
    rear_swing_body_x_shift: 0.0              # 后腿摆动时，对支撑腿足端 x 目标做的机身前送补偿
    support_pitch_balance_gain: 0.45          # 前后腿长度差转成俯仰补偿的增益
    support_pitch_balance_max_offset: 0.020   # 上述俯仰补偿的最大绝对值，单位 m
    support_pitch_balance_target_delta: -0.010  # 默认要求后腿比前腿更伸一点，抬高后半身
    filter_alpha: 0.80              # 一阶低通滤波系数，越大响应越快、越小越平滑

    # 启动、站立和步态切换
    stand_only: false               # true 时只站立不进入行走
    enable_startup_stand: true      # 启动先走站起流程，再切到站稳/行走
    use_direct_joint_stand_targets: true   # 站立相直接用关节角目标，而不是站姿 IK 结果
    use_startup_crouch_pose: false         # 是否先进入一个低趴 crouch 姿态
    joint_isolation_mode: "disabled"       # 关节隔离测试模式；disabled/kfe_only 等
    joint_isolation_kfe_target: -0.70      # kfe_only 模式下的 KFE 目标角
    startup_settle_duration: 0.50          # 站起前静置等待时间，单位 s
    startup_min_support_scale: 0.0         # 启动初期支撑/前馈缩放的下限
    startup_initial_gain_scale: 0.03       # 启动初始 PD 增益倍率
    stand_up_duration: 1.0                 # 从初始姿态过渡到站姿的时长，单位 s
    startup_knee_first_ratio: 0.60         # 站起过程中“先动膝盖”的阶段占比
    stand_hold_duration: 0.25              # 站起后进入步态前的短暂停留时间
    walk_ramp_duration: 0.30               # 从站姿平滑过渡到行走轨迹的时间
    stand_gain_scale: 0.9                  # 站立相整体增益倍率
    stand_haa_slew_rate: 0.25              # HAA 站姿目标变化最大角速度，单位 rad/s
    stand_hfe_slew_rate: 0.35              # HFE 站姿目标变化最大角速度，单位 rad/s
    stand_kfe_slew_rate: 0.45              # KFE 站姿目标变化最大角速度，单位 rad/s

    # 前馈、调试与等效质量
    gravity_ff_scale: 0.1           # 重力补偿前馈整体倍率
    shank_mass_ratio: 0.5           # 等效腿质量分给小腿的比例，剩余部分给大腿
    debug_joint_tracking: false     # 是否周期性打印关节跟踪调试日志
    debug_log_period: 0.5           # 调试日志打印周期，单位 s

    # 轨迹数组顺序统一为: LF, LH, RF, RH
    phase_offsets: [0.0, 0.5, 0.5, 0.0]
    # foot_x_signs: [-1.0, -1.0, -1.0, -1.0]  # 按当前模型实测，-1 才是前进方向
    # foot_x_signs: [1.0, -1.0, -1.0, 1.0]  # 向左转
    #foot_x_signs: [-1.0, 1.0, 1.0, -1.0]  # 向右转
    foot_x_signs: [1.0, 1.0, 1.0, 1.0]  # 后退
    # foot_x_signs: [0.0, 0.0, 0.0, 0.0]  # 原地踏步：关闭足端 x 方向摆动，只保留抬腿节奏
    gait_foot_x_offsets: [0.02, -0.01, 0.02, -0.01]  # 让后腿名义落点别太靠后，减轻后腿起摆时把机身往后顶
    stand_foot_x_offsets: [0.0, 0.0, 0.0, 0.0]       # 站姿下四条腿的足端 x 偏移

    # 关节名义角、方向和站姿目标
    nominal_haa_angles: [0.0, 0.0, 0.0, 0.0]         # gait 相 HAA 名义角
    nominal_hfe_angles: [-0.67, -0.67, -0.67, -0.67] # 用于零位/显示参考的 HFE 名义角
    nominal_kfe_angles: [0.09, 0.09, 0.09, 0.09]     # 用于零位/显示参考的 KFE 名义角
    direct_haa_signs: [1.0, 1.0, 1.0, 1.0]           # 直接关节目标模式下 HAA 方向符号
    direct_hfe_signs: [1.0, 1.0, 1.0, 1.0]           # 直接关节目标模式下 HFE 方向符号
    direct_kfe_signs: [1.0, 1.0, 1.0, 1.0]           # 直接关节目标模式下 KFE 方向符号
    stand_haa_targets: [0.0, 0.0, 0.0, 0.0]          # 站姿 HAA 目标角
    stand_hfe_targets: [0.08, 0.09, 0.08, 0.09]  # 后腿站姿别再那么收，减轻后半身偏低
    stand_kfe_targets: [-0.14, -0.15, -0.14, -0.15]  # 站姿 KFE 目标角
    startup_crouch_haa_targets: [0.0, 0.0, 0.0, 0.0]     # 启动低趴姿态的 HAA 目标角
    startup_crouch_hfe_targets: [0.04, 0.05, 0.04, 0.05] # 启动低趴姿态的 HFE 目标角
    startup_crouch_kfe_targets: [-0.06, -0.065, -0.06, -0.065]  # 启动低趴姿态的 KFE 目标角

    # 几何参数与重力补偿等效质量
    thigh_lengths: [0.198825, 0.198825, 0.198825, 0.198825]  # 四条腿统一大腿长度
    shank_lengths: [0.22225, 0.22225, 0.22225, 0.22225]      # 四条腿统一小腿长度
    gravity_masses: [0.62, 0.62, 0.62, 0.62]                 # 计算重力补偿时每条腿使用的等效质量

    # 关节零位与启动姿态
    auto_zero_offsets: false           # true 时根据名义站姿自动估算偏置；false 时直接使用下面手动偏置
    apply_initial_joint_pose_in_gazebo: false  # 是否在 Gazebo 启动时额外写入初始关节姿态
    hfe_offsets: [-0.264487, -0.324164, -0.264487, -0.324164]  # HFE 手动零位偏置
    kfe_offsets: [-0.884820, -0.974002, -0.884820, -0.974002]  # KFE 手动零位偏置

    # 关节 PD 增益
    haa_kp: 18.0   # HAA 比例增益
    haa_kd: 2.0    # HAA 微分增益
    hfe_kp: 40.0   # HFE 比例增益
    hfe_kd: 4.5    # HFE 微分增益
    kfe_kp: 52.0   # KFE 比例增益
    kfe_kd: 4.5    # KFE 微分增益
