deep_motor_node:
  ros__parameters:
    # Current host port mapping observed on 2026-04-03:
    # 3-1.1 -> can0, 3-1.2 -> can1, 3-1.3 -> can2, 3-1.4 -> can3
    # Desired leg order is LF, LH, RF, RH by physical USB port:
    # LF=3-1.2, LH=3-1.1, RF=3-1.3, RH=3-1.4
    can_interfaces: [can1, can0, can2, can3]
    motors_per_can: 3
    motor_ids: [0, 1, 2]
    joint_names:
      - LF_HAA
      - LF_HFE
      - LF_KFE
      - LH_HAA
      - LH_HFE
      - LH_KFE
      - RF_HAA
      - RF_HFE
      - RF_KFE
      - RH_HAA
      - RH_HFE
      - RH_KFE
    command_topic: /motor_cmd
    feedback_topic: /motor_feedback
    joint_state_topic: /joint_states
    configure_can: true
    can_bitrate: 1000000
    can_txqueuelen: 1000
    can_interface_wait_sec: 5.0
    can_configure_retries: 3
    control_rate_hz: 400.0
    status_log_period_sec: 5.0
