# 仿生足式比赛静态规则地图。
#
# 用途：
#   在 YOLO/自动识别箱子还没完成前，用这份“规则理想地图”生成箱子目标点、
#   箱子前停车点、返还区位置、减速带和场地边界，供 RViz 预览和导航节点使用。
#
# 单位：
#   - 长度单位统一为米 m。
#   - yaw 角单位为弧度 rad。
#   - color 为 RGBA，取值范围 0.0 ~ 1.0。
#
# 坐标系约定：
#   - frame_id: odom。
#   - 原点: 比赛开始时，机器人位于 1 m x 1 m 出发区中心。
#   - +X: 从出发区穿过入口，指向场地内部。
#   - +Y: 机器人站在出发区面向场地时，机器人左手方向。
#   - yaw 0: 朝向 +X，也就是正对场地内部。
#
# 标定原则：
#   1. 这份文件里的绝对坐标目前按规则图的理想尺寸填写。
#   2. 有些尺寸规则文字没有单独写明，只能从图示读数，所以后续必须用卷尺复核。
#   3. 现场测量后，只改本文件里的对应参数，不需要改代码。
frame_id: odom

# 高度参数：描述 odom/Odin1 坐标系与真实地面的垂直关系。
# 作用：
#   - x/y/yaw 决定平面导航。
#   - z 主要用于 RViz 中让地图贴合 Odin1 点云看到的地面。
#   - 当前导航控制主要看平面坐标，z 不直接决定狗走不走。
height:
  # 地图元素：Odin1/odom 原点到地面的高度。
  # 怎么测：
  #   从地面垂直量到 Odin1 坐标原点的大致高度；如果不知道坐标原点位置，
  #   就在 RViz 中微调到场地图形正好贴着点云地面。
  # 修改影响：
  #   影响 target_pose_z 的推荐值，也影响你理解 odom 与地面的高度关系。
  # 示例：
  #   Odin1 原点离地 0.42 m，则这里填 0.42。
  odom_to_ground: 0.30
  # 地图元素：/navigation/field_target_pose 和 /navigation/field_box_pose 的 z 坐标。
  # 怎么设：
  #   通常填 -odom_to_ground，让目标点落在地面平面附近。
  # 修改影响：
  #   主要影响 RViz 中目标点高度；平面导航仍主要使用 x/y/yaw。
  target_pose_z: -0.30

# 场地边界：规则图中的 6000 mm x 4000 mm 场地内部区域。
# 地图元素：
#   这里描述四面内墙/边界在 odom 坐标系里的位置。
field:
  # 规则元素：场地长度。
  # 方向：沿 +X，从入口侧内墙到远端内墙。
  # 规则理想值：6000 mm = 6.0 m。
  # 修改影响：影响 far_wall_x、减速带、返还区等绝对位置的校验。
  length: 6.0
  # 规则元素：场地宽度。
  # 方向：沿 Y，从右侧内墙到左侧内墙。
  # 规则理想值：4000 mm = 4.0 m。
  # 修改影响：影响左右边界和居中布置的箱子/返还区。
  width: 4.0
  # 地图元素：入口侧内墙的 X 坐标。
  # 怎么测：
  #   从出发区中心沿 +X 量到进入场地的那条内墙/边线。
  # 规则图理解：
  #   出发区为 1 m x 1 m，中心到出发区前边缘约 0.50 m，所以理想值为 +0.50。
  # 修改影响：
  #   如果你的机器人初始原点不是出发区几何中心，这里要跟着实际原点修正。
  near_wall_x: 0.50
  # 地图元素：远端内墙的 X 坐标。
  # 怎么测：
  #   far_wall_x = near_wall_x + 实测场地长度。
  # 理想值：
  #   0.50 + 6.00 = 6.50。
  # 修改影响：
  #   影响返还区 center_x、减速带 center_x 是否符合图示距离。
  far_wall_x: 6.50
  # 地图元素：右侧内墙的 Y 坐标。
  # 怎么测：
  #   机器人面向场地时，从出发区中心线向右量到右侧内墙。
  # 坐标约定：
  #   右侧为负 Y。
  # 理想值：
  #   场地宽 4 m 且出发区中心线与场地中心线重合时，为 -2.00。
  right_wall_y: -2.00
  # 地图元素：左侧内墙的 Y 坐标。
  # 怎么测：
  #   机器人面向场地时，从出发区中心线向左量到左侧内墙。
  # 坐标约定：
  #   左侧为正 Y。
  # 理想值：
  #   场地宽 4 m 且出发区中心线与场地中心线重合时，为 +2.00。
  left_wall_y: 2.00

# 出发区：规则图入口外侧的 1000 mm x 1000 mm 虚线方框。
# 地图元素：
#   这里定义机器人初始位置所在的区域，用作整张规则地图的原点参考。
start_zone:
  # 地图元素：出发区中心坐标。
  # 怎么测：
  #   如果开机/比赛开始时把机器人 base 或 Odin1 odom 原点放在出发区中心，这里保持 [0.0, 0.0]。
  # 修改影响：
  #   当前代码假设整张地图以这个点为原点；一般不建议改，除非你更换原点定义。
  center: [0.0, 0.0]
  # 地图元素：机器人初始朝向。
  # 0.0 表示正对场地内部，也就是朝 +X。
  # 如果开局不是正对场地，才需要修改。
  yaw: 0.0
  # 规则元素：出发区尺寸。
  # 规则图理想值：1.00 m x 1.00 m。
  size: [1.00, 1.00]

# 储物箱区域：2 行 x 4 列，共 8 个 250 mm x 250 mm 的箱子放置区域。
# 地图元素：
#   这里定义“箱子中心”和“箱子前停车点”的生成规则。
# 行列约定：
#   - row 0：靠近出发区的第一排箱子。
#   - row 1：更靠近场地内部的第二排箱子。
#   - col 0：机器人面向场地时最左侧的箱子，前提是 sort_left_to_right_positive_y 为 true。
storage_grid:
  # 规则元素：储物箱区域行数。
  # 规则图理想值：2 行。
  rows: 2
  # 规则元素：储物箱区域列数。
  # 规则图理想值：4 列。
  cols: 4
  # 规则元素：物资箱本体边长。
  # 规则理想值：250 mm = 0.25 m。
  # 修改影响：
  #   主要影响 RViz 可视化中箱子大小，不直接改变箱子中心点。
  box_size: 0.25
  # 规则元素：每个箱子放置方框的尺寸。
  # 规则理想值：250 mm x 250 mm。
  # 修改影响：
  #   主要影响 RViz 中储物格的显示大小。
  zone_size: [0.25, 0.25]
  # 规则元素：前后两个储物格之间的间隔。
  # 当前理解：
  #   规则文字/图示中的 600 mm 被理解为两个 250 mm 方框边缘之间的空隙。
  #   所以中心距 = 0.25 + 0.60 = 0.85 m。
  # 现场确认：
  #   如果实物场地的 600 mm 指的是中心到中心距离，则应把 center_spacing_x 改成 0.60。
  zone_gap_x: 0.60
  # 规则元素：左右相邻两个储物格之间的间隔。
  # 当前理解同上：
  #   中心距 = 0.25 + 0.60 = 0.85 m。
  # 现场确认：
  #   如果实物场地的 600 mm 指的是中心到中心距离，则应把 center_spacing_y 改成 0.60。
  zone_gap_y: 0.60
  # 地图元素：两排箱子中心之间的 X 方向距离。
  # 怎么测：
  #   从第一排任意一个箱子中心，沿 +X 量到第二排同列箱子中心。
  # 修改影响：
  #   改变 row 1 的所有箱子目标点。
  center_spacing_x: 0.85
  # 地图元素：相邻两列箱子中心之间的 Y 方向距离。
  # 怎么测：
  #   从某列箱子中心，沿左右方向量到相邻列箱子中心。
  # 修改影响：
  #   改变 col 1/2/3 的所有箱子目标点。
  center_spacing_y: 0.85
  # 地图元素：第一排箱子中心的 X 坐标。
  # 怎么测：
  #   从出发区中心沿 +X 量到第一排箱子中心线。
  # 图示推算：
  #   规则图看起来第一排箱子中心线距入口侧内墙约 1.50 m；
  #   near_wall_x 为 0.50，所以理想 row0_center_x = 0.50 + 1.50 = 2.00。
  # 修改影响：
  #   同时平移两排箱子的 X 位置，是最需要现场复核的参数之一。
  row0_center_x: 2.00
  # 地图元素：第 0 列，也就是最左侧箱子中心的 Y 坐标。
  # 怎么测：
  #   机器人面向场地时，从出发区中心线向左量到最左列箱子中心。
  # 理想推算：
  #   假设 4 列箱子整体在 4 m 场地宽度内居中，
  #   四列中心为 +1.275、+0.425、-0.425、-1.275。
  # 修改影响：
  #   同时平移四列箱子的 Y 位置，是另一个需要现场复核的参数。
  col0_center_y: 1.275
  # 地图元素：列编号方向。
  # true：
  #   col 从左到右递增，Y 坐标依次减小。
  # false：
  #   col 从右到左递增，Y 坐标依次增大。
  # 修改场景：
  #   如果你发现手动发 [0, 0] 时目标跑到右侧，优先检查这里。
  sort_left_to_right_positive_y: true
  # 储物箱接近点：用于“导航到箱子面前”，不是箱子中心本身。
  approach:
    # 地图元素：机器人从箱子的哪一侧接近并停车。
    # negative_x：
    #   从出发区/入口方向接近箱子，停车点在箱子中心的 -X 一侧。
    # 修改场景：
    #   如果后续夹取机构需要从侧面取箱，可以改为其他方向并同步改代码支持。
    side: negative_x
    # 地图元素：机器人 base 中心到箱子中心的停车距离。
    # 怎么测：
    #   实车停稳后，量机器人 base 中心到箱子中心的水平距离；
    #   让机械臂/吸盘/夹爪刚好进入舒适工作范围。
    # 修改影响：
    #   只改变“箱子前停车点”，不改变箱子中心显示位置。
    standoff: 0.40

# 返还区：远端附近的 4 个 400 mm x 400 mm 彩色放置区。
# 地图元素：
#   后续做“把箱子送到指定颜色区域”时，这里生成返还区中心点和返还区前停车点。
# 编号约定：
#   按规则语义设置为 food=0、tool=1、instrument=2、medicine=3。
return_zones:
  # 规则元素：单个返还区尺寸。
  # 规则理想值：400 mm x 400 mm。
  zone_size: [0.40, 0.40]
  # 规则元素：相邻返还区之间的间隔。
  # 规则理想值：400 mm。
  zone_gap_y: 0.40
  # 地图元素：相邻返还区中心的 Y 方向距离。
  # 理想推算：
  #   中心距 = 返还区宽 0.40 + 间隔 0.40 = 0.80 m。
  # 怎么测：
  #   从一个返还区中心沿左右方向量到相邻返还区中心。
  center_spacing_y: 0.80
  # 地图元素：四个返还区中心共同使用的 X 坐标。
  # 怎么测：
  #   从出发区中心沿 +X 量到返还区中心线。
  # 规则约束：
  #   返还区边缘距墙至少 0.60 m。
  # 理想推算：
  #   center_x = far_wall_x - 0.60 - 返还区半宽 0.20 = 5.70。
  # 修改影响：
  #   同时移动四个返还区的前后位置。
  center_x: 5.70
  # 地图元素：第 0 个返还区，也就是最左侧返还区中心的 Y 坐标。
  # 怎么测：
  #   从出发区中心线向左量到第 0 个返还区中心。
  # 理想推算：
  #   假设 4 个返还区整体在场地宽度内居中，则第 0 个中心为 +1.20。
  # 修改影响：
  #   同时平移 4 个返还区的 Y 位置。
  col0_center_y: 1.20
  # 返还区接近点：后续放箱时的停车点。
  approach:
    # 地图元素：从返还区哪一侧接近。
    # negative_x 表示从入口方向接近返还区。
    side: negative_x
    # 地图元素：机器人 base 中心到返还区中心的停车距离。
    # 怎么调：
    #   根据夹取/释放机构的工作距离调整。
    standoff: 0.55
  # 返还区语义和可视化颜色。
  # id：
  #   后续任务逻辑使用的类别编号。
  # name/label：
  #   RViz 标注和状态输出使用的名字。
  # color：
  #   RViz 显示颜色，格式为 [R, G, B, A]。
  zones:
    - id: 0
      name: food
      label: food
      color: [0.0, 0.75, 0.20, 0.55]
    - id: 1
      name: tool
      label: tool
      color: [0.50, 0.50, 0.50, 0.55]
    - id: 2
      name: instrument
      label: instrument
      color: [0.0, 0.25, 1.0, 0.55]
    - id: 3
      name: medicine
      label: medicine
      color: [1.0, 0.05, 0.05, 0.55]

# 减速带：规则图中的黄色/黑色障碍带。
# 地图元素：
#   当前只用于 RViz 可视化和路径风险判断参考；后续如果要自动绕行或减速，
#   可以基于这里的 center_x/size 生成禁行区或低速区。
speed_bump:
  # 地图元素：减速带中心的 X 坐标。
  # 规则图示：
  #   减速带中心距远端墙约 2.50 m。
  # 理想推算：
  #   center_x = far_wall_x - 2.50 = 4.00。
  # 怎么测：
  #   从出发区中心沿 +X 量到减速带中心线。
  center_x: 4.00
  # 地图元素：减速带中心的 Y 坐标。
  # 理想设置：
  #   减速带横跨场地宽度并居中，所以为 0.0。
  center_y: 0.0
  # 地图元素：减速带尺寸 [X方向宽度, Y方向长度, 高度]。
  # 规则图示：
  #   X 方向宽度约 0.35 m，高度约 0.05 m。
  # 当前显示：
  #   Y 方向长度设为 4.00 m，表示在 RViz 中横跨整个场地宽度。
  size: [0.35, 4.00, 0.05]

# RViz 可视化参数：只影响显示效果，不改变导航目标的 x/y/yaw。
markers:
  # 显示元素：地图 Marker 发布周期，单位秒。
  # 数值越小刷新越频繁；静态地图通常 0.5 秒足够。
  publish_period: 0.5
  # 显示元素：RViz 中文字标签高度。
  # 如果标签太大遮挡箱子，调小；如果看不清，调大。
  text_height: 0.16
  # 显示元素：RViz 中场地、箱子、返还区、减速带绘制所在的地面 z 坐标。
  # 怎么调：
  #   看 Odin1 点云地面，如果地图悬空就减小这个值；
  #   如果地图沉到地面以下就增大这个值。
  # 推荐关系：
  #   通常接近 -height.odom_to_ground，但可以按 RViz 实际显示微调。
  ground_z: -0.35
